<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel = "stylesheet" href ="style.css">
 
  <title>Calculator</title>
 </head>
 <body>
  
  <div id="main-body">
   <input type="text" id="input" placeholder="Enter expression">
   <div id="buttons">
    <div class="left-buttons">
     <div id="left-row-1" class = "row">
      <button data-val = "SIN()" >Sin</button>
      <button data-val = "ASIN()">Sin^-1 </button>
      <button data-val = "SQ()"> Sqr</button>
      <button data-val = "SQRT()"> Sqrt </button>
      <button data-val = "DIST(x1,y1,x2,y2)"> Dist</button>
     </div>
     <div id="left-row-2" class = "row">
      <button data-val = "COS()"> Cos</button>
      <button data-val = "ACOS()"> Cos^-1</button>
      <button data-val = "^"> ^</button>
      <button data-val = "ROOT()(degree,radicand)"> Root</button>
      <button data-val = ">>"> >></button>
     </div>
     <div id="left-row-3" class = "row">
      <button data-val = "TAN()"> Tan</button>
      <button data-val = "ATAN()"> Tan^-1</button>
      <button data-val = "LOG()"> Log</button>
      <button data-val = "LOGB(base,argument)"> LogB</button>
      <button data-val = "<<"> <<</button>
     </div>
     <div id="left-row-4" class = "row">
      <button data-val = "ℇ"> ℇ</button>
      <button data-val = "7"> 7</button>
      <button data-val = "8"> 8</button>
      <button data-val = "9"> 9</button>
      <button data-val = "ROUND"> Round </button>
     </div>
     <div id="left-row-5" class = "row">
      <button data-val = "π"> π</button>
      <button data-val = "4"> 4</button>
      <button data-val = "5"> 5</button>
      <button data-val = "6"> 6</button>
      <button data-val = "("> ( </button>
      
     </div>
     <div id="left-row-6" class = "row">
      <button data-val = "0"> 0</button>
      <button data-val = "1"> 1</button>
      <button data-val = "2"> 2</button>
      <button data-val = "3"> 3</button>
      <button data-val = ")"> ) </button>
     </div>
     <div id="left-row-7" class = "row">
      <button data-val = "+"> +</button>
      <button data-val = "-"> -</button>
      <button data-val = "*"> *</button>
      <button data-val = "/"> /</button>
      <button data-val = "%"> %</button>
     </div>
    </div>
    <div class="right-buttons">
     <div id="right-row-1" class = "row">
      <button data-val = "!"> !</button>
      
     </div>
     <div id="right-row-2" class = "row">
      <button data-val = "ABS()"> Abs</button>
     </div>
     <div id="right-row-3" class = "row">
      <button data-val = "ENTER"> ENTER</button>
     </div>
    </div>
  </div>


 
  <script type = 'module' src = 'index.js'></script>
 </body>
</html>
